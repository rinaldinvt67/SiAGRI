<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiAGRI - Profile</title>
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: white;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
        }
        a {
            text-decoration: none;
        }
        a:hover {
            color: black;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #f1f1f1;
            border-top: 1px solid #ddd;
            margin-top: 20px;
        }
        .input-group {
  position: relative;
  margin: 20px 0;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  outline: none;
  font-size: 16px;
}

.input-group label {
  position: absolute;
  left: 12px;
  top: 12px;
  color: #888;
  background-color: white;
  padding: 0 4px;
  transition: 0.2s ease all;
  pointer-events: pointer; /* supaya label tidak mengganggu klik input */
}

/* Saat input fokus atau ada isi */
.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
  top: -8px;
  left: 10px;
  font-size: 12px;
  color: #333;
}

    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SiAGRI</div>
        <ul class="nav-links">
            <a href="landingpage.html">Home</a>
            <a href="#">Settings</a>
            <a href="#">Logout</a>
        </ul>
    </nav>
    <div class="profile-container">
        <h1>Welcome to Your Profile</h1>
        <p>This is where you can view and edit your personal information.</p>
    </div>
    <div class="profile-info" style="display: flex;">
        <div id="profile" style="flex: 1; display: flex; width: 250px; height: 250px; background-color: aqua;">
                <img src="Assets/images/Placeholder-photo.png" style="width: 200px; height: 200px; border-radius: 50%; margin: 25px 30px 25px;">
                <p>username info</p>
        </div>
        <div style="flex: 2; background-color: lightcoral;">
            username
            info
        </div>
    </div>
    <div class="input-group">
        <input type="text" id="username" placeholder="" required>
        <label for="username">Username</label>
    </div>

    <footer>
        &copy; 2026 SiAGRI. All rights reserved.
    </footer>
</body>
</html>
