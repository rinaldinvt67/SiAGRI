<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiAGRI</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: white;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
}

.logo {
    font-weight: bold;
    font-size: 20px;
    color: seagreen;
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 20px;
}

.nav-links a {
    text-decoration: none;
    color: black;
    font-weight: 500;
}

.btn-login {
    background: seagreen;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px 20px;
    background: #f5f5f5;
}

.hero h1 {
    font-size: 32px;
    color: seagreen;
}

.hero p {
    margin-top: 10px;
    color: #555;
}

/* PINTEREST GRID */
.grid {
    column-count: 3;
    column-gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 15px;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* Variasi ukuran */
.tall {
    height: 200px;
}

.wide {
    height: 120px;
}

/* HOVER EFFECT */
.card:hover {
    transform: scale(1.03);
    transition: 0.2s;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .grid {
        column-count: 2;
    }
}

@media (max-width: 500px) {
    .grid {
        column-count: 1;
    }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">🌾 SiAGRI</div>

    <nav>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Marketplace</a></li>
            <li><a href="#">Forum</a></li>
        </ul>
    </nav>

    <a href="Login page.html" class="btn-login">Login</a>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Solusi Pertanian Modern</h1>
    <p>Platform untuk petani dan supplier terhubung</p>
</section>

<!-- PINTEREST STYLE GRID -->
<main class="grid">
    <div class="card">🌱 Pupuk</div>
    <div class="card tall">🌾 Bibit</div>
    <div class="card">🚜 Alat</div>
    <div class="card wide">📊 Harga Pasar</div>
    <div class="card">💬 Forum</div>
</main>

</body>
</html>
